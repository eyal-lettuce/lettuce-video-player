<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Video Player Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #021F21;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', sans-serif;
    }

    .player-wrapper {
      position: relative;
      width: 500px;
      height: 300px;
      border-radius: 16px;
      overflow: hidden;
      background: #000;
    }

    /* ── Thumbnail overlay ── */
    .thumbnail-overlay {
      position: absolute;
      inset: 0;
      cursor: pointer;
    }

    .thumbnail-overlay img.thumb {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .video-title {
      position: absolute;
      bottom: 24px;
      left: 24px;
      font-family: 'Inter', sans-serif;
      font-weight: 800;
      font-size: 22px;
      color: #ffffff;
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
      pointer-events: none;
      user-select: none;
    }

    .play-btn {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 72px;
      height: 72px;
      pointer-events: none;
    }

    .play-btn .circle {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.45);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s ease;
    }

    .play-btn .triangle {
      width: 0;
      height: 0;
      border-style: solid;
      border-width: 13px 0 13px 22px;
      border-color: transparent transparent transparent #000000;
      margin-left: 4px;
    }

    .thumbnail-overlay:hover .circle {
      background: #9FE963;
    }

    /* ── Video element ── */
    video.main-video {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
    }

    /* ── Custom controls ── */
    .controls {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 8px 12px 10px;
      background: linear-gradient(to top, rgba(0,0,0,0.75) 0%, transparent 100%);
      display: flex;
      align-items: center;
      gap: 8px;
      opacity: 0;
      transition: opacity 0.2s ease;
    }

    .player-wrapper:hover .controls,
    .player-wrapper.paused .controls {
      opacity: 1;
    }

    /* ── Content overlay (demo-specific content) ── */
    .content-overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s ease;
    }

    .player-wrapper:hover .content-overlay {
      opacity: 1;
    }

    .content-overlay > * {
      pointer-events: all;
    }

    .ask-ai-btn {
      position: absolute;
      top: 14px;
      right: 14px;
      background: rgba(0, 0, 0, 0.55);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 20px;
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 700;
      padding: 6px 14px;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
    }

    .ask-ai-btn:hover {
      background: rgba(159, 233, 99, 0.2);
      border-color: #9FE963;
      color: #9FE963;
    }

    /* Progress bar */
    .progress-bar {
      flex: 1;
      height: 4px;
      background: rgba(255,255,255,0.3);
      border-radius: 2px;
      cursor: pointer;
      position: relative;
    }

    .progress-fill {
      height: 100%;
      background: #9FE963;
      border-radius: 2px;
      width: 0%;
      pointer-events: none;
    }

    .progress-bar:hover .progress-fill {
      background: #fff;
    }

    /* Icon buttons */
    .ctrl-btn {
      background: none;
      border: none;
      padding: 0;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      opacity: 0.9;
      transition: opacity 0.15s, color 0.15s;
      flex-shrink: 0;
    }
    .ctrl-btn:hover { opacity: 1; color: #9FE963; }

    /* SVG icons */
    .ctrl-btn svg { display: block; }

    /* Time */
    .time-display {
      font-size: 11px;
      font-weight: 700;
      color: rgba(255,255,255,0.85);
      letter-spacing: 0.02em;
      white-space: nowrap;
      flex-shrink: 0;
    }

    /* Spacer */
    .spacer { flex: 1; }

    /* Speed button */
    .speed-btn {
      background: none;
      border: 1px solid rgba(255,255,255,0.25) !important;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 700;
      padding: 0 4px;
      height: 16px;
      letter-spacing: 0.02em;
    }

    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>

  <div class="player-wrapper" id="playerWrapper">
    <!-- Thumbnail mode -->
    <div class="thumbnail-overlay" id="thumbnailOverlay">
      <img class="thumb" src="thumb.png" alt="Video thumbnail">
      <div class="play-btn">
        <div class="circle">
          <div class="triangle"></div>
        </div>
      </div>
      <div class="video-title">How Your Income Flows</div>
    </div>

    <!-- Video -->
    <video class="main-video hidden" id="mainVideo" src="video.mp4" playsinline></video>

    <!-- Content overlay (demo-specific) -->
    <div class="content-overlay hidden" id="contentOverlay">
      <button class="ask-ai-btn">Ask AI about your income</button>
    </div>

    <!-- Custom controls -->
    <div class="controls hidden" id="controls">
      <!-- Play/Pause -->
      <button class="ctrl-btn" id="playPauseBtn" title="Play/Pause">
        <svg id="iconPause" width="18" height="18" viewBox="0 0 18 18" fill="currentColor">
          <rect x="3" y="2" width="4" height="14" rx="1"/>
          <rect x="11" y="2" width="4" height="14" rx="1"/>
        </svg>
        <svg id="iconPlay" width="18" height="18" viewBox="0 0 18 18" fill="currentColor" class="hidden">
          <path d="M4 2.5l11 6.5-11 6.5z"/>
        </svg>
      </button>

      <!-- Mute -->
      <button class="ctrl-btn" id="muteBtn" title="Mute">
        <svg id="iconVol" width="18" height="18" viewBox="0 0 18 18" fill="currentColor">
          <path d="M3 6.5h3l4-3.5v12l-4-3.5H3V6.5z"/>
          <path d="M12 6a4 4 0 0 1 0 6" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round"/>
        </svg>
        <svg id="iconMute" width="18" height="18" viewBox="0 0 18 18" fill="currentColor" class="hidden">
          <path d="M3 6.5h3l4-3.5v12l-4-3.5H3V6.5z"/>
          <line x1="12" y1="6" x2="17" y2="12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="17" y1="6" x2="12" y2="12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </button>

      <!-- Elapsed time -->
      <span class="time-display" id="timeElapsed">0:00</span>

      <!-- Progress bar -->
      <div class="progress-bar" id="progressBar">
        <div class="progress-fill" id="progressFill"></div>
      </div>

      <!-- Total time -->
      <span class="time-display" id="timeDuration">0:00</span>

      <!-- Speed -->
      <button class="ctrl-btn speed-btn" id="speedBtn" title="Playback speed">×1</button>

      <!-- Fullscreen -->
      <button class="ctrl-btn" id="fullscreenBtn" title="Fullscreen">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="1,5 1,1 5,1"/>
          <polyline points="11,1 15,1 15,5"/>
          <polyline points="1,11 1,15 5,15"/>
          <polyline points="15,11 15,15 11,15"/>
        </svg>
      </button>
    </div>
  </div>

  <script>
    const overlay     = document.getElementById('thumbnailOverlay');
    const wrapper     = document.getElementById('playerWrapper');
    const video       = document.getElementById('mainVideo');
    const controls        = document.getElementById('controls');
    const contentOverlay  = document.getElementById('contentOverlay');
    const playPauseBtn = document.getElementById('playPauseBtn');
    const iconPlay    = document.getElementById('iconPlay');
    const iconPause   = document.getElementById('iconPause');
    const progressBar = document.getElementById('progressBar');
    const progressFill = document.getElementById('progressFill');
    const timeElapsed  = document.getElementById('timeElapsed');
    const timeDuration = document.getElementById('timeDuration');
    const muteBtn      = document.getElementById('muteBtn');
    const iconVol      = document.getElementById('iconVol');
    const iconMute     = document.getElementById('iconMute');
    const speedBtn = document.getElementById('speedBtn');
    const fullscreenBtn = document.getElementById('fullscreenBtn');

    // Start from thumbnail
    overlay.addEventListener('click', () => {
      overlay.classList.add('hidden');
      video.classList.remove('hidden');
      controls.classList.remove('hidden');
      contentOverlay.classList.remove('hidden');
      video.play();
    });

    // Play / pause
    function syncPlayPause() {
      const paused = video.paused;
      iconPlay.classList.toggle('hidden', !paused);
      iconPause.classList.toggle('hidden', paused);
      wrapper.classList.toggle('paused', paused);
    }

    playPauseBtn.addEventListener('click', () => {
      video.paused ? video.play() : video.pause();
    });

    video.addEventListener('play', syncPlayPause);
    video.addEventListener('pause', syncPlayPause);

    // Single click = play/pause, double click = fullscreen
    let clickTimer = null;
    video.addEventListener('click', () => {
      if (clickTimer) {
        clearTimeout(clickTimer);
        clickTimer = null;
        // double click — toggle fullscreen
        if (document.fullscreenElement) {
          document.exitFullscreen();
        } else {
          wrapper.requestFullscreen();
        }
      } else {
        clickTimer = setTimeout(() => {
          clickTimer = null;
          video.paused ? video.play() : video.pause();
        }, 250);
      }
    });

    // Progress
    function formatTime(s) {
      const m = Math.floor(s / 60);
      const sec = Math.floor(s % 60).toString().padStart(2, '0');
      return `${m}:${sec}`;
    }

    video.addEventListener('timeupdate', () => {
      if (!video.duration) return;
      const pct = (video.currentTime / video.duration) * 100;
      progressFill.style.width = pct + '%';
      timeElapsed.textContent = formatTime(video.currentTime);
      timeDuration.textContent = formatTime(video.duration);
    });

    progressBar.addEventListener('click', (e) => {
      const rect = progressBar.getBoundingClientRect();
      const pct = (e.clientX - rect.left) / rect.width;
      video.currentTime = pct * video.duration;
    });

    // Mute
    muteBtn.addEventListener('click', () => {
      video.muted = !video.muted;
      syncMute();
    });

    function syncMute() {
      const muted = video.muted || video.volume === 0;
      iconVol.classList.toggle('hidden', muted);
      iconMute.classList.toggle('hidden', !muted);
    }

    // Speed — cycle through ×1 → ×1.2 → ×1.5 → ×1
    const speeds = [1, 1.2, 1.5];
    const speedLabels = ['×1', '×1.2', '×1.5'];
    let speedIndex = 0;

    speedBtn.addEventListener('click', () => {
      speedIndex = (speedIndex + 1) % speeds.length;
      video.playbackRate = speeds[speedIndex];
      speedBtn.textContent = speedLabels[speedIndex];
    });

    // Spacebar = play/pause
    document.addEventListener('keydown', (e) => {
      if (e.code === 'Space' && !controls.classList.contains('hidden')) {
        e.preventDefault();
        video.paused ? video.play() : video.pause();
      }
    });

    // Fullscreen
    fullscreenBtn.addEventListener('click', () => {
      if (document.fullscreenElement) {
        document.exitFullscreen();
      } else {
        wrapper.requestFullscreen();
      }
    });
  </script>

</body>
</html>
